<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Músicas</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="lado-imagem"></div>

    <div class="conteudo">
        <a href="../index.html" class="voltar">← Voltar ao Menu</a>

        <header>
            <h1>Music Finder</h1>
            <p>Descubra detalhes da sua música favorita</p>
        </header>

        <section class="consulta">
            
            <div class="campo acoes-busca">
                <input 
                    type="text" 
                    id="nomeMusica" 
                    placeholder="Digite o nome da música (ex: Chop Suey)"
                >
                <button id="btnBuscar">Buscar Música</button>
            </div>

            <div id="wrapperAudio" class="busca-audio-wrapper">
                <button type="button" id="btnAudio" class="btn-audio" title="Identificar por áudio">
                    <svg class="icon-microfone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                        <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
                        <line x1="12" y1="19" x2="12" y2="22"/>
                    </svg>
                </button>
                <span id="statusAudio" class="status-audio"></span>
            </div>

            <div class="resultado">
                <div class="item">
                    <span class="titulo">Música</span>
                    <span id="musicaNome">-</span>
                </div>

                <div class="item">
                    <span class="titulo">Banda / Artista</span>
                    <span id="bandaNome">-</span>
                </div>

                <div class="item">
                    <span class="titulo">Álbum e Ano</span>
                    <span id="albumInfo">-</span>
                </div>

                <div class="item">
                    <span class="titulo">Capa do Álbum</span>
                    <img id="capaAlbum" alt="Capa do Álbum" style="display:none; width:180px; border-radius:12px; margin-top:10px;">
                </div>

                <div class="item">
                    <span class="titulo">Clipe Oficial</span>
                    <div id="videoContainer" style="margin-top: 15px;"></div>
                </div>
            </div>
        </section>
    </div>

    <script src="scripts/api-musica.js"></script>
</body>
</html>
